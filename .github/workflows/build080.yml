name: Build Lost 0.8.0 APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'v0.8.0'

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Устанавливаем старый Gradle 2.14.1 вручную, чтобы обойти системный 9.6.1
      - name: Setup Legacy Gradle
        run: |
          wget -q https://gradle.org
          unzip -q gradle-2.14.1-bin.zip
          echo "${PWD}/gradle-2.14.1/bin" >> $GITHUB_PATH

      - name: Build APK with Legacy Gradle
        # Теперь команда запустит именно старый скачанный Gradle
        run: gradle assembleDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-code-v0.8.0-debug
          path: "**/*.apk"
