name: Build Lost 0.8.0 Version APK
on: workflow_dispatch # Кнопка появится в любой ветке

jobs:
  build:
    runs-on: ubuntu-20.04
    steps:
      # Хитрый трюк: заставляем Гитхаб скачать код конкретного тега, а не ветки
      - uses: actions/checkout@v4
        with:
          ref: 'v0.8.0' # Имя твоего тега. Гитхаб сам найдет его в истории

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build APK
        run: ./gradlew assembleDebug --no-daemon
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-code-v0.8.0-debug
          path: "**/*.apk"
