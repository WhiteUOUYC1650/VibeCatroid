name: Build Lost 0.8.0 APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'v0.8.0'

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      - name: Setup Gradle 2.14.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '2.14.1'

      # Шаг 1: Смотрим, какие папки и файлы вообще лежат внутри тега
      - name: Look inside repository
        run: ls -la

      # Шаг 2: Спрашиваем у Gradle, какие команды сборки он видит
      - name: List available Gradle tasks
        run: gradle tasks --all
        continue-on-error: true

      # Шаг 3: Пробуем собрать проект через универсальную команду build
      - name: Build APK with fallback
        run: gradle build --no-daemon -x test
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-code-v0.8.0-debug
          path: "**/*.apk"
