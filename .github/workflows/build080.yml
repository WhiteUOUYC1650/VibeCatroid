name: Build Lost 0.8.0 APK
on: workflow_dispatch

jobs:
  build:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
        with:
          ref: 'v0.8.0'

      - name: set up JDK 8
        uses: actions/setup-java@v4
        with:
          java-version: '8'
          distribution: 'temurin'

      # Используем официальный инструмент от разработчиков Gradle. 
      # Он сам скачает, распакует и пропишет пути для версии 2.14.1 без ошибок.
      - name: Setup Gradle 2.14.1
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '2.14.1'

      - name: Build APK with Legacy Gradle
        run: gradle assembleDebug --no-daemon --stacktrace
        continue-on-error: true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: pocket-code-v0.8.0-debug
          path: "**/*.apk"
