name: Universal Old Version Builder

on:
  workflow_dispatch:
    inputs:
      target_tag:
        description: 'v0.8.0'
        required: true
        default: 'v0.8.0' # Версия по умолчанию, если ничего не ввели

jobs:
  build:
    runs-on: ubuntu-20.04

    steps:
    - name: Checkout Code
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.target_tag }} # Робот берет тег прямо из вашего текстового поля ввода!

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8'

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK
      uses: actions/upload-artifact@v4
      with:
        name: pocket-code-${{ github.event.inputs.target_tag }}-apk
        path: |
          **/build/outputs/apk/**/*.apk
          **/build/apk/**/*.apk
