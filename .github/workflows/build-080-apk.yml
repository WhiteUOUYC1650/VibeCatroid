name: Build v0.8.0 APK

on:
  workflow_dispatch: # Позволяет запускать сборку вручную кнопкой из браузера

jobs:
  build:
    runs-on: ubuntu-20.04 # Используем старое стабильное окружение

    steps:
    - name: Checkout Code v0.8.0
      uses: actions/checkout@v4
      with:
        ref: 'v0.8.0' # Переключаем сервер на код версии 0.8.0

    - name: Set up JDK 8
      uses: actions/setup-java@v4
      with:
        distribution: 'zulu'
        java-version: '8' # Древнему коду критически важна Java 8

    - name: Grant execute permission for gradlew
      run: chmod +x gradlew

    - name: Build APK with Gradle
      run: ./gradlew assembleDebug --no-daemon

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: pocket-code-v0.8.0-apk
        path: |
          **/build/outputs/apk/**/*.apk
          **/build/apk/**/*.apk
